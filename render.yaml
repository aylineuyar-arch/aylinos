services:
  - type: web
    name: aylinos
    runtime: python
    buildCommand: /opt/render/project/src/.venv/bin/pip install --no-cache-dir -r requirements.txt
    startCommand: gunicorn api.server:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: RAPIDAPI_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: PORT
        value: 8000
